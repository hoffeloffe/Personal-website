server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression - optimized for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/x-font-ttf font/opentype;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # No cache for index.html (new deployments picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # PDF downloads
    location ~* ^/files/.*\.pdf$ {
        add_header Content-Disposition 'attachment';
        add_header Content-Type application/pdf;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
