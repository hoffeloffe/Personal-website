name: Infra

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  validate-whatif:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: >-
          az deployment sub validate
          --location westeurope
          --template-file infra/main.bicep
          --parameters infra/params/${{ matrix.environment }}.bicepparam

      - name: What-if Bicep
        run: >-
          az deployment sub what-if
          --location westeurope
          --template-file infra/main.bicep
          --parameters infra/params/${{ matrix.environment }}.bicepparam

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: validate-whatif
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: >-
          az deployment sub create
          --name portfolio-${{ github.event.inputs.environment }}-${{ github.run_number }}
          --location westeurope
          --template-file infra/main.bicep
          --parameters infra/params/${{ github.event.inputs.environment }}.bicepparam
